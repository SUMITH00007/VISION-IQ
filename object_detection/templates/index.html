<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object Detection Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0914;
            --card-bg: rgba(22, 19, 38, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-color: #00e4e4;
            --text-main: #f3f1f8;
            --text-muted: #a49fc6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top, rgba(156, 108, 255, 0.08) 0%, transparent 60%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
        }

        .container {
            max-width: 640px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 5px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        /* Video Feed Viewport */
        .viewport-container {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            aspect-ratio: 4/3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .viewport-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px;
            margin-top: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        /* Controls */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .slider-input {
            flex-grow: 1;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        .slider-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
            transition: transform 0.1s;
        }

        .slider-input::-webkit-slider-thumb:hover {
            transform: scale(1.25);
        }

        .slider-val {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-color);
            font-weight: 700;
            min-width: 45px;
            font-size: 1rem;
        }

        /* Detections List */
        .detections-container {
            margin-top: 10px;
        }

        .detections-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .detections-list {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .detection-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            padding: 4px 6px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 4px;
        }

        .detection-name {
            font-weight: 600;
        }

        .detection-count {
            color: var(--accent-color);
            font-weight: bold;
            font-family: 'JetBrains Mono', monospace;
        }

        .no-detections {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
            padding: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Object Detection</h1>
            <p>Live camera stream with real-time detection</p>
        </header>

        <!-- Video Feed -->
        <div class="card" style="padding: 10px;">
            <div class="viewport-container">
                <img src="/video_feed" class="viewport-img" id="feedElement" alt="Webcam Feed Loading...">
            </div>
            
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-label">FPS</div>
                    <div class="stat-value" id="fpsVal">0.0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Latency</div>
                    <div class="stat-value" id="latencyVal">0 ms</div>
                </div>
            </div>
        </div>

        <!-- Controls & Results -->
        <div class="card" style="display: flex; flex-direction: column; gap: 15px;">
            <!-- Confidence Slider -->
            <div class="control-group">
                <label for="confSlider">Detection Sensitivity</label>
                <div class="slider-row">
                    <input type="range" id="confSlider" min="0.05" max="0.80" step="0.05" class="slider-input">
                    <span id="confValText" class="slider-val">0.25</span>
                </div>
            </div>

            <!-- Detections List -->
            <div class="detections-container">
                <div class="detections-title">Detected Objects</div>
                <div id="detectionsList" class="detections-list">
                    <div class="no-detections">No objects detected</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const defaultConfig = {{ default_config | tojson }};

        // Elements
        const confSlider = document.getElementById('confSlider');
        const confValText = document.getElementById('confValText');
        const fpsVal = document.getElementById('fpsVal');
        const latencyVal = document.getElementById('latencyVal');
        const detectionsList = document.getElementById('detectionsList');

        // Apply defaultConfig values
        if (defaultConfig && defaultConfig.conf) {
            confSlider.value = defaultConfig.conf;
            confValText.textContent = Number(defaultConfig.conf).toFixed(2);
        }

        // Slider input listener
        confSlider.addEventListener('input', () => {
            confValText.textContent = Number(confSlider.value).toFixed(2);
        });

        // Config Sync POST
        function saveConfig() {
            const config = {
                model: "yolov8n.pt", // Hardcoded
                conf: parseFloat(confSlider.value),
                tracking_enabled: false, // Disabled
                line_pos: 0.5,
                line_dir: "horizontal",
                paused: false
            };

            fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            }).catch(err => console.error("Error saving configuration:", err));
        }

        confSlider.addEventListener('change', saveConfig);

        // Fetch metrics and update lists
        function fetchStats() {
            fetch('/api/stats')
                .then(res => res.json())
                .then(data => {
                    fpsVal.textContent = Number(data.fps).toFixed(1);
                    latencyVal.textContent = Math.round(data.inference_time_ms) + ' ms';
                    
                    detectionsList.innerHTML = '';
                    const entries = Object.entries(data.active_detections);
                    if (entries.length === 0) {
                        detectionsList.innerHTML = '<div class="no-detections">No objects detected</div>';
                    } else {
                        entries.forEach(([cls, count]) => {
                            const item = document.createElement('div');
                            item.className = 'detection-item';
                            item.innerHTML = `<span class="detection-name">${cls}</span><span class="detection-count">${count}</span>`;
                            detectionsList.appendChild(item);
                        });
                    }
                })
                .catch(err => console.error("Error fetching metrics:", err));
        }
        setInterval(fetchStats, 1000);
    </script>
</body>
</html>
